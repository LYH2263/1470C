name: Quick Check

on:
  push:
    branches-ignore: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quick-check:
    name: Quick Tests & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:run

      - name: Check build
        run: |
          pnpm prisma generate
          pnpm build
